name: Solana Crash Watchdog

on:
  schedule:
    - cron: '*/5 * * * *'  # This triggers the bot every 5 minutes
  workflow_dispatch:       # This adds the manual "Run workflow" button

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        # We must include 'supabase' here so the script can talk to your database
        run: pip install requests pyTelegramBotAPI supabase

      - name: Run The Bot
        env:
          PYTHONUNBUFFERED: 1  # Forces logs to show up live on your screen
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          BIRDEYE_API_KEY: ${{ secrets.BIRDEYE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python bot.py
